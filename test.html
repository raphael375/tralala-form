<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body style="font-family:sans-serif;padding:2rem;max-width:400px;">
<h2>Test envoi Google Sheet</h2>
<p id="status" style="font-weight:bold;">En attente…</p>
<button onclick="send()" style="padding:12px 24px;background:#1400FF;color:white;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">Envoyer test</button>

<script>
async function send() {
  document.getElementById('status').textContent = 'Envoi en cours…';
  
  const url = 'https://script.google.com/macros/s/AKfycbxa-z-qXP0fpNC4VxV4mN8uZDUtUY4XHFdhMgRMWqqq4NzvKff_sYpDTcXBnhc1cT1ZLw/exec';
  
  const formData = new FormData();
  formData.append('1. Identité de la structure : Nom de la salle', 'TEST TRALALA');
  formData.append('1. Identité de la structure : Statut juridique', 'Association loi 1901');

  try {
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });
    document.getElementById('status').textContent = '✓ Requête envoyée — vérifie le Google Sheet !';
    document.getElementById('status').style.color = 'green';
  } catch(e) {
    document.getElementById('status').textContent = 'Erreur : ' + e.message;
    document.getElementById('status').style.color = 'red';
  }
}
</script>
</body>
</html>
